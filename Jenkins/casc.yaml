jenkins:
  systemMessage: "Jenkins configured automatically"

  numExecutors: 2

  mode: NORMAL

  labelString: "docker"

appearance:
  locale:
    systemLocale: en
    ignoreAcceptLanguage: true
  themeManager:
    disableUserThemes: true
    theme: "darkSystem"


tool:
  maven:
    installations:
      - name: "Maven 3.9.15"
        properties:
          - installSource:
              installers:
                - maven:
                    id: "3.9.15"
                    
  sonarRunnerInstallation:
    installations:
      - name: "SonarScanner 8.1"
        properties:
          - installSource:
              installers:
                - sonarRunnerInstaller:
                    id: "8.1.0.6389"

jobs:
  - file: /usr/share/jenkins/ref/jobs.groovy