services:
  vprodb:
    build:
      context: ./Docker-files/db
    image: talkeret/vprofiledb
    container_name: vprodb
    ports:
      - "${DB_PORT}:3306"
    volumes:
      - vprodbdata:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASS}
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  vprocache01:
    image: memcached
    container_name: vprocache01
    ports:
      - "${MEMCACHED_PORT}:11211"
    healthcheck:
      test: [ "CMD-SHELL", "echo > /dev/tcp/127.0.0.1/11211 || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  vpromq01:
    image: rabbitmq
    container_name: vpromq01
    ports:
      - "${RABBITMQ_PORT}:5672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "-q", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  vproapp:
    build:
      context: .
      dockerfile: ./Docker-files/app/Dockerfile
    image: talkeret/vprofileapp
    container_name: vproapp
    env_file:
      - .env
    depends_on:
      vprodb:
        condition: service_healthy
    ports:
      - "${APP_PORT}:8080"
    volumes:
      - vproappdata:/usr/local/tomcat/webapps
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  vproweb:
    build:
      context: ./Docker-files/web
    image: talkeret/vprofileweb
    container_name: vproweb
    ports:
      - "80:80"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:80" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      - vproapp

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.0
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9200" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  vprodbdata: {}
  vproappdata: {}
